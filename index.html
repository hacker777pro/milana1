<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Lana — Косметика и парфюмерия</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="header-inner">
        <div class="logo" onclick="showPage('home')">✨ Mi Lana</div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Поиск по брендам и товарам...">
        </div>
        <div class="header-actions">
    <button class="action-btn fav-btn-header" onclick="showPage('favorites')">
        ♡ <span id="favCount" class="badge">0</span>
    </button>
    <button class="action-btn cart-btn" onclick="showPage('cart')">
        🛒 <span id="cartCount" class="badge">0</span>
    </button>
    <div id="authButtons">
        <button class="action-btn" onclick="openModal('loginModal')">👤 Войти</button>
    </div>
    <div id="userButtons" style="display:none;">
        <button class="action-btn" onclick="openModal('profileModal')">
            👤 <span id="userName"></span>
        </button>
    </div>
</div>
        </div>
    </div>
</header>

<div class="nav-categories">
    <button class="cat-btn active" data-cat="" data-sub="">Все товары</button>
    <button class="cat-btn" data-cat="care" data-sub="">Уходовая косметика</button>
    <button class="cat-btn" data-cat="makeup" data-sub="">Декоративная косметика</button>
</div>

<div class="container">
    <div id="homePage" class="page active">
        <h1 class="section-title">Каталог</h1>
        <div class="products-grid" id="productsGrid"></div>
    </div>
    <div id="cartPage" class="page">
        <h1 class="section-title">Корзина</h1>
        <div id="cartContent"></div>
    </div>
    <div id="favoritesPage" class="page">
        <h1 class="section-title">Избранное</h1>
        <div id="favoritesContent"></div>
    </div>
</div>

<!-- ВХОД -->
<div class="modal" id="loginModal">
    <div class="modal-content">
        <span class="modal-close" onclick="closeModal('loginModal')">&times;</span>
        <h2 class="modal-title">Вход</h2>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="your@email.com">
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" id="loginPassword" placeholder="••••••••">
        </div>
        <button class="btn btn-primary btn-full" onclick="login()">Войти</button>
        <div class="form-footer">
            Нет аккаунта? <a onclick="closeModal('loginModal'); openModal('registerModal')">Зарегистрироваться</a>
        </div>
    </div>
</div>

<!-- РЕГИСТРАЦИЯ -->
<div class="modal" id="registerModal">
    <div class="modal-content">
        <span class="modal-close" onclick="closeModal('registerModal')">&times;</span>
        <h2 class="modal-title">Регистрация</h2>
        <div class="form-group">
            <label>Имя</label>
            <input type="text" id="regName" placeholder="Ваше имя">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="regEmail" placeholder="your@email.com">
        </div>
        <div class="form-group">
            <label>Телефон</label>
            <input type="tel" id="regPhone" placeholder="+7 (999) 123-45-67">
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" id="regPassword" placeholder="Минимум 6 символов">
        </div>
        <div class="form-group">
            <label>Повторите пароль</label>
            <input type="password" id="regPassword2" placeholder="Повторите пароль">
        </div>
        <button class="btn btn-primary btn-full" onclick="register()">Создать аккаунт</button>
        <div class="form-footer">
            Уже есть аккаунт? <a onclick="closeModal('registerModal'); openModal('loginModal')">Войти</a>
        </div>
    </div>
</div>

<!-- ПРОФИЛЬ -->
<div class="modal" id="profileModal">
    <div class="modal-content">
        <span class="modal-close" onclick="closeModal('profileModal')">&times;</span>
        <h2 class="modal-title">Профиль</h2>
        <div style="background:var(--pink-light);padding:24px;border-radius:16px;text-align:center;margin-bottom:24px;">
            <div style="width:80px;height:80px;border-radius:50%;background:var(--pink);color:white;font-size:32px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;" id="profileAvatar"></div>
            <div style="font-size:20px;font-weight:700;" id="profileName"></div>
            <div style="color:var(--text-light);font-size:14px;" id="profileEmail"></div>
        </div>
        <button class="btn btn-outline btn-full" onclick="logout()">Выйти из аккаунта</button>
    </div>
</div>

<!-- ДЕТАЛИ ТОВАРА -->
<div class="modal product-detail-modal" id="productModal">
    <div class="modal-content">
        <span class="modal-close" onclick="closeModal('productModal')">&times;</span>
        <div id="productDetails"></div>
    </div>
</div>

<div class="notification" id="notification"></div>
<script src="js/app.js"></script>
</body>
</html>
